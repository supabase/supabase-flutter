name: supabase
description: A dart client for Supabase. This client makes it simple for developers to build secure and scalable products.
version: 2.14.0
homepage: 'https://supabase.com'
repository: 'https://github.com/supabase/supabase-flutter/tree/main/packages/supabase'
issue_tracker: 'https://github.com/supabase/supabase-flutter/issues'
documentation: 'https://supabase.com/docs/reference/dart/introduction'
topics:
  - supabase
  - backend
  - database
  - auth
  - api

environment:
  sdk: '>=3.9.0 <4.0.0'

resolution: workspace

dependencies:
  functions_client: 2.6.4
  gotrue: 2.26.0
  http: ^1.6.0
  postgrest: 2.8.0
  realtime_client: 2.11.0
  storage_client: 2.6.0
  rxdart: ^0.28.0
  yet_another_json_isolate: 2.1.1
  logging: ^1.3.0

dev_dependencies:
  supabase_lints: ^0.1.0
  test: ^1.31.0
  web_socket_channel: '>=3.0.0 <4.0.0'
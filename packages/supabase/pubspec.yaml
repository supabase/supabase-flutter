  gotrue: 2.27.0
  http: ^1.6.0
  meta: ^1.7.0
  postgrest: 2.9.0
  realtime_client: 2.12.0
  storage_client: 2.7.0
  supabase_common: 0.1.1
  yet_another_json_isolate: 2.1.1
  logging: ^1.3.0

dev_dependencies:
  supabase_lints: ^0.1.1
  test: ^1.25.0
  web_socket_channel: '>=3.0.0 <4.0.0'
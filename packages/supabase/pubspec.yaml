name: supabase
description: A dart client for Supabase. This client makes it simple for developers to build secure and scalable products.
version: 2.13.1
homepage: 'https://supabase.com'
repository: 'https://github.com/supabase/supabase-flutter/tree/main/packages/supabase'
documentation: 'https://supabase.com/docs/reference/dart/introduction'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  functions_client: 2.6.2
  gotrue: 2.23.0
  http: ^1.2.2
  postgrest: 2.7.3
  realtime_client: 2.9.0
  storage_client: 2.5.8
  rxdart: '>=0.27.5 <0.29.0'
  yet_another_json_isolate: 2.1.1
  logging: ^1.2.0

dev_dependencies:
  supabase_lints: ^0.1.0
  test: ^1.17.9
  web_socket_channel: '>=2.2.0 <4.0.0'
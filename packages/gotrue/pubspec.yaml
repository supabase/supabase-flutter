name: gotrue
description: A dart client library for the GoTrue API.
version: 2.26.0
homepage: "https://supabase.com"
repository: "https://github.com/supabase/supabase-flutter/tree/main/packages/gotrue"
issue_tracker: "https://github.com/supabase/supabase-flutter/issues"
documentation: "https://supabase.com/docs/reference/dart/auth-signup"
topics:
  - supabase
  - auth
  - authentication
  - backend
  - api

environment:
  sdk: ">=3.9.0 <4.0.0"

resolution: workspace

dependencies:
  collection: ^1.19.0
  crypto: ^3.0.7
  http: ^1.6.0
  meta: ^1.16.0
  logging: ^1.3.0
  web: ">=1.0.0 <2.0.0"
  dart_jsonwebtoken: ">=3.0.0 <4.0.0"

dev_dependencies:
  dotenv: ^4.2.0
  supabase_lints: ^0.1.0
  test: ^1.25.0
  otp: ^3.2.0

false_secrets:
  - /test/**

name: postgrest
description: PostgREST client for Dart. This library provides an ORM interface to PostgREST.
version: 2.8.0
homepage: 'https://supabase.com'
repository: 'https://github.com/supabase/supabase-flutter/tree/main/packages/postgrest'
issue_tracker: 'https://github.com/supabase/supabase-flutter/issues'
documentation: 'https://supabase.com/docs/reference/dart/select'
topics:
  - supabase
  - postgrest
  - database
  - orm
  - api

environment:
  sdk: '>=3.9.0 <4.0.0'

resolution: workspace

dependencies:
  http: ^1.6.0
  yet_another_json_isolate: 2.1.1
  meta: ^1.16.0
  logging: ^1.3.0

dev_dependencies:
  collection: ^1.19.0
  supabase_lints: ^0.1.0
  test: ^1.25.0

false_secrets:
  - /test/**

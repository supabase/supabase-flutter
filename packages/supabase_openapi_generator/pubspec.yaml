name: supabase_openapi_generator
description: >-
  Generates idiomatic Dart HTTP clients for Supabase services from OpenAPI 3.0
  specifications, with streaming upload, streaming response and multipart
  support.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.5.0

dependencies:
  # code_builder + dart_style are used by the code generator in bin/. The
  # generated library code (lib/) depends only on http.
  code_builder: ^4.11.1
  dart_style: ^3.1.9
  http: ^1.2.2

dev_dependencies:
  supabase_lints: ^0.1.0
  test: ^1.24.0

name: Example integration tests

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  SUPABASE_CLI_VERSION: 2.109.1

jobs:
  backend:
    name: Host shared Supabase
    if: startsWith(github.event.pull_request.title, 'chore(release)')
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TARGET_IDS: linux web android macos ios windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start Supabase
        run: supabase start --workdir examples

      - name: Install cloudflared
        run: |
          sudo curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared

      - name: Expose Supabase through a tunnel
        id: tunnel
        run: |
          set -euo pipefail
          supabase status -o env --workdir examples > sb.env
          api_url=$(grep '^API_URL=' sb.env | cut -d= -f2- | tr -d '"')
          key=$(grep '^PUBLISHABLE_KEY=' sb.env | cut -d= -f2- | tr -d '"')
          if [ -z "$key" ]; then
            key=$(grep '^ANON_KEY=' sb.env | cut -d= -f2- | tr -d '"')
          fi

          cloudflared tunnel --no-autoupdate --url "$api_url" > cloudflared.log 2>&1 &
          public_url=""
          for _ in $(seq 1 30); do
            public_url=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' cloudflared.log | head -n1 || true)
            [ -n "$public_url" ] && break
            sleep 2
          done
          if [ -z "$public_url" ]; then
            echo "Failed to open a cloudflared tunnel." >&2
            cat cloudflared.log >&2
            exit 1
          fi
          echo "Supabase is reachable at $public_url"

          mkdir -p endpoint
          jq -n --arg url "$public_url" --arg key "$key" '{url: $url, key: $key}' \
            > endpoint/endpoint.json

      - name: Publish Supabase endpoint
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supabase-endpoint
          path: endpoint/endpoint.json
          retention-days: 1

      - name: Wait for the test jobs to finish
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 2700 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            names=$(gh api \
              "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
              --paginate -q '.artifacts[].name')
            missing=""
            for id in $TARGET_IDS; do
              echo "$names" | grep -qx "done-$id" || missing="$missing $id"
            done
            if [ -z "$missing" ]; then
              echo "All test jobs reported done."
              break
            fi
            echo "Still waiting for:$missing"
            sleep 15
          done

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup --workdir examples || true

  test:
    name: ${{ matrix.id }}
    if: startsWith(github.event.pull_request.title, 'chore(release)')
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: linux, os: ubuntu-latest, target: linux }
          - { id: web, os: ubuntu-latest, target: web }
          - { id: android, os: ubuntu-latest, target: android }
          - { id: macos, os: macos-latest, target: macos }
          - { id: ios, os: macos-latest, target: ios }
          - { id: windows, os: windows-latest, target: windows }
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev xvfb

      - name: Boot iOS simulator
        if: matrix.target == 'ios'
        run: |
          set -euo pipefail
          udid=$(xcrun simctl list devices available -j \
            | jq -r '[.devices[][] | select(.name | test("iPhone"))][0].udid')
          xcrun simctl boot "$udid" || true
          echo "IOS_DEVICE=$udid" >> "$GITHUB_ENV"

      - name: Wait for the Supabase endpoint
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 90); do
            if gh run download "${{ github.run_id }}" -n supabase-endpoint -D endpoint; then
              break
            fi
            echo "Waiting for the Supabase endpoint..."
            sleep 10
          done
          test -f endpoint/endpoint.json
          {
            echo "SUPABASE_URL=$(jq -r .url endpoint/endpoint.json)"
            echo "SUPABASE_PUBLISHABLE_KEY=$(jq -r .key endpoint/endpoint.json)"
          } >> "$GITHUB_ENV"

      - name: Scaffold platform and get dependencies
        shell: bash
        run: |
          set -euo pipefail
          for example in database_crud passkeys; do
            (cd "examples/$example" \
              && flutter create --platforms=${{ matrix.target }} . \
              && flutter pub get)
          done

      - name: Run integration tests
        if: matrix.target != 'android'
        shell: bash
        run: bash .github/scripts/run_example_integration_tests.sh ${{ matrix.target }}

      - name: Run integration tests (Android emulator)
        if: matrix.target == 'android'
        uses: reactivecircus/android-emulator-runner@c9c93e6ba9c4194322e114c40970d5983d9a07cc # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          script: bash .github/scripts/run_example_integration_tests.sh android

      - name: Signal completion
        if: always()
        shell: bash
        run: |
          mkdir -p done
          echo done > "done/${{ matrix.id }}"

      - name: Upload completion marker
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: done-${{ matrix.id }}
          path: done/${{ matrix.id }}
          retention-days: 1

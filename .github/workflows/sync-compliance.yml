name: Sync SDK Compliance Matrix

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Checkout capability spec
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: supabase/sdk
          path: _sdk-spec

      - name: Append new capability IDs
        run: python3 .github/scripts/sync_compliance_matrix.py

      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if git diff --quiet -- sdk-compliance.yaml; then
            echo "No new capability IDs; nothing to do."
            exit 0
          fi

          branch="chore/sync-compliance-matrix"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add sdk-compliance.yaml
          git commit -m "chore: sync new capability IDs from canonical spec"
          git push --force-with-lease origin "$branch"

          body="$(printf 'New capability IDs from https://github.com/supabase/sdk were added as `not_implemented`.\n\nTriage each one: set the real status, add symbols/notes, and move it into the right section before merging.\n\n')"
          while IFS= read -r feature_id; do
            [ -n "$feature_id" ] && body="${body}- \`${feature_id}\`"$'\n'
          done < new_ids.txt

          if [ -n "$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')" ]; then
            echo "Pull request already open for $branch; pushed the update."
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore: sync new capability IDs from canonical spec" \
              --body "$body"
          fi

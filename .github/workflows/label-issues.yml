name: Auto-Label Issues and PRs

on:
  pull_request:
    types:
      - opened
      - edited
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    uses: supabase/actions/.github/workflows/label-issues.yml@2e898cb306c525525ad3f0b34c6f0ab1e3f8ba87
    with:
      label_mappings: |
        {
          "gotrue": "auth",
          "auth": "auth",
          "storage": "storage",
          "storage_client": "storage",
          "realtime": "realtime",
          "realtime_client": "realtime",
          "postgrest": "postgrest",
          "functions": "functions",
          "functions_client": "functions",
          "auth_ui": "auth-ui",
          "supabase": "supabase",
          "supabase_flutter": "supabase_flutter"
        }

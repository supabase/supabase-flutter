name: "\U0001F41E Bug report"
description: Report an issue with a Supabase Flutter/Dart Library
labels: [bug]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is. If you intend to submit a PR for this issue, tell us in the description. Thanks!
      placeholder: I am doing ... What I expect is ... What actually happening is ...
    validations:
      required: true
  - type: dropdown
    id: supabase-library
    attributes:
      label: Library affected
      description: Select the library that you think is affected by the bug
      options:
        - supabase_flutter
        - supabase
        - gotrue
        - postgrest
        - realtime_client
        - storage_client
        - functions_client
        - yet_another_json_isolate
        - unsure/all/other
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction
      description: If possible, please provide a link to a repo that can reproduce the problem you ran into. A [minimal reproduction](https://stackoverflow.com/help/minimal-reproducible-example) is very helpful. ([Why?](https://antfu.me/posts/why-reproductions-are-required)). If a report is vague (e.g. just a generic error message) and has no reproduction, it will receive a "needs reproduction" label. If no reproduction is provided after 7 days, it will be closed.
      placeholder: Reproduction URL
    validations:
      required: false
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: Please provide any reproduction steps that may need to be described.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
  - type: textarea
    id: system-info
    attributes:
      label: System Info
      description: |
        Output of `flutter doctor -v`, plus the versions of the affected packages.

        On Linux/macOS:
        `dart pub deps | grep -E "supabase|gotrue|postgrest|storage_client|realtime_client|functions_client"`

        On Windows:
        `dart pub deps | findstr "supabase gotrue postgrest storage_client realtime_client functions_client"`
      render: shell
      placeholder: Flutter, Dart and package versions
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select the platform(s) on which you can reproduce the bug
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Optional if a reproduction is provided. It's very helpful to provide the log text instead of a screenshot.

        Provide the error log here in the format below.

        ````
        <details>
        <summary>Click to expand!</summary>

        ```shell
        // paste the log text here
        ```
        </details>
        ````
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Validations
      description: Before submitting the issue, please make sure you do the following
      options:
        - label: Follow our [Code of Conduct](https://github.com/supabase/.github/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: Read the [docs](https://supabase.com/docs/reference/dart/introduction).
          required: true
        - label: Check that there isn't [already an issue](https://github.com/supabase/supabase-flutter/issues) that reports the same bug to avoid creating a duplicate.
          required: true
        - label: Make sure this is a Supabase Flutter/Dart Library issue and not an issue with the Supabase platform. If it's a Supabase platform related bug, it should likely be reported to [supabase/supabase](https://github.com/supabase/supabase) instead.
          required: true
        - label: Check that this is a concrete bug. For Q&A open a [GitHub Discussion](https://github.com/supabase/supabase-flutter/discussions) or join our [Discord Chat Server](https://discord.supabase.com/).
          required: true
        - label: The provided reproduction is a [minimal reproducible example](https://stackoverflow.com/help/minimal-reproducible-example) of the bug.
          required: true

  auth.sign_in.sign_up:
    status: implemented
    symbols:
      - GoTrueClient.signUp
  auth.sign_in.sign_in_with_password:
    status: implemented
    symbols:
      - GoTrueClient.signInWithPassword
  auth.sign_in.sign_in_with_otp:
    status: implemented
    symbols:
      - GoTrueClient.signInWithOtp
  auth.sign_in.sign_in_with_oauth:
    status: implemented
    symbols:
